<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Início</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/navbasStyle.css}">
    <link rel="stylesheet" th:href="@{/css/fundo.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">


</head>
<body>

<div th:insert="navbar :: navigation" class="nav-wrapper"></div>


<div class="container mb-5 mt-5">
    <h1 class="mb-4">Visão Geral</h1>

    <div class="row g-4"> <div class="col-md-4">
        <div class="card text-white bg-primary shadow-sm">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h5 class="card-title mb-0">Usuários</h5>
                        <p class="fs-1 fw-bold" th:text="${qtdUsuario}">150</p> </div>
                    <i class="bi bi-people-fill" style="font-size: 3rem; opacity: 0.5;"></i>
                </div>

            </div>
        </div>
    </div>

        <div class="col-md-4">
            <div class="card text-white bg-success shadow-sm">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h5 class="card-title mb-0">Vagas Disponiveis</h5>
                            <p class="fs-1 fw-bold" th:text="${qtdvagas}"></p> </div>
                        <i class="bi bi-car-front" style="font-size: 3rem; opacity: 0.5;"></i>
                    </div>

                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-white bg-warning shadow-sm">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h5 class="card-title mb-0">Reservas</h5>
                            <p class="fs-1 fw-bold" th:text="${qtdReserva}"></p> </div>
                        <i class="bi bi-calendar-check-fill" style="font-size: 3rem; opacity: 0.5;"></i>
                    </div>

                </div>
            </div>
        </div>

<!-- Rodapé -->
<footer class="text-center py-3">
    <div class="container">
        <span class="text-muted">© Turma 2024/2 - 2025/2 | SENAI Desenvolvimento de Sistemas</span>
    </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.4/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
