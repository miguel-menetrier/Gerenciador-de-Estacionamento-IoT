<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Cadastro de vagas de estacionamento</title>

  <!-- Adicione os links para os arquivos CSS do Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  <link rel="stylesheet" th:href="@{/css/navbasStyle.css}">
  <link rel="stylesheet" th:href="@{/css/fundo.css}">
</head>
<body>

<div th:insert="navbar :: navigation" class="nav-wrapper"></div>

<div class="container mt-3">

  <div class="card shadow mb-4">
    <div class="card-header py-3">
      <h6 class="m-0 font-weight-bold text-primary">Reserva</h6>
    </div>
    <div class="card-body">
      <!-- inicio do formulário, deve conter apenas os inputs e botão-->
      <form method="post" th:action="@{'/reserva/'+${reservaDto.id}}"
            th:object="${reservaDto}">


          <div class="mb-3">
              <label for="estacionamento_id" class="form-label">Vaga de Estacionamento</label>
              <select class="form-select" th:field="*{estacionamentoId}" id="estacionamento_id" required>
                  <option value="">Selecione uma vaga</option>
                  <option th:each="est : ${estacionamentoList}"
                          th:value="${est.id}"
                          th:text="${est.estacionamentoNumero}">
                  </option>
              </select>
          </div>

          <div class="mb-3">
              <label for="hora_chegada" class="form-label">Hora de Chegada</label>
              <input type="time" class="form-control" th:field="*{horariochegada}" id="hora_chegada" required/>
          </div>

          <div class="mb-3">
              <label for="reserva_datainicio" class="form-label">Data inicial</label>
              <input type="date" class="form-control" th:field="*{reservaDatainicio}" id="reserva_datainicio" required/>
          </div>

        <div class="mb-3">
          <label for="nome_carro" class="form-label">Carro</label>
          <input type="text" class="form-control" th:field="*{nomeCarro}"
                 id="nome_carro" name="nome_carro"
                 placeholder="Fiat" required/>
        </div>

        <div class="mb-3">
          <label for="hora_saida" class="form-label">Hora de Saída</label>
          <input type="time" class="form-control"
                 th:value="${#temporals.format(reservaDto.horarioSaida, 'HH:mm')}"
                 id="hora_saida" name="horarioSaida" required/>
        </div>


        <div class="mb-3">
          <label for="reserva_datafim" class="form-label">Data final</label>
          <input type="date" class="form-control"
                 th:value="${#temporals.format(reservaDto.reservadataFim, 'yyyy-MM-dd')}"
                 id="reserva_datafim" name="reservadataFim" required/>
        </div>



        <div class="row">
          <div class="col-auto">
            <button type="submit" class="btn btn-primary w-100">Atualizar</button>
          </div>
          <div class="col-auto">
            <a th:href="@{~/reservalista}" class="btn btn-secondary">Fechar</a>
          </div>
        </div>
        <br><br>
        <div th:if="${param.erro}" class="alert alert-danger d-flex flex-column align-items-center text-center"
             role="alert">
          <span th:text="${erroDto.mensagem}">Mensagem de erro</span>
        </div>
        <!-- Fim do formulário -->
      </form>

    </div>
  </div>
</div>
<!-- Fim conteúdo principal -->

<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

<!-- Rodapé -->
<footer class="text-center py-3">
  <div class="container">
    <span class="text-muted">© Turma 2023/2 - 2025/1 | SENAI Desenvolvimento de Sistemas</span>
  </div>
</footer>

</body>
</html>
