<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Cadastro de Reserva</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/navbasStyle.css}">
    <link rel="stylesheet" th:href="@{/css/fundo.css}">
</head>
<body>

<div th:insert="navbar :: navigation" class="nav-wrapper"></div>

<div class="container mt-3">
    <div class="card shadow mb-4">
        <div class="card-header py-3">
            <h6 class="m-0 font-weight-bold text-primary">Nova Reserva</h6>
        </div>
        <div class="card-body">

            <form method="post" th:action="@{/reserva}" th:object="${reservaDto}">

                <div class="mb-3">
                    <label for="usuario_id" class="form-label">Usuário</label>
                    <select class="form-select" th:field="*{usuarioId}" id="usuario_id" required>
                        <option value="">Selecione um usuário</option>
                        <th:block th:if="${usuarioList != null}">
                            <option th:each="u : ${usuarioList}"
                                    th:value="${u.id}"
                                    th:text="${u.nome}">
                            </option>
                        </th:block>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="estacionamento_id" class="form-label">Vaga de Estacionamento</label>
                    <select class="form-select" th:field="*{estacionamentoId}" id="estacionamento_id" required>
                        <option value="">Selecione uma vaga</option>
                        <th:block th:if="${estacionamentoList != null}">
                            <option th:each="est : ${estacionamentoList}"
                                    th:value="${est.id}"
                                    th:text="${est.estacionamentoNumero}">
                            </option>
                        </th:block>
                    </select>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="nome_carro" class="form-label">Nome do Carro</label>
                        <input type="text" class="form-control" th:field="*{nomeCarro}"
                               id="nome_carro" placeholder="Ex: Fiat Uno" required/>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="placa_carro" class="form-label">Placa do Carro</label>
                        <input type="text" class="form-control" th:field="*{placaCarro}"
                               id="placa_carro" placeholder="ABC-1234" required/>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="reserva_datainicio" class="form-label">Data Inicial</label>
                        <input type="date" class="form-control" th:field="*{reservaDatainicio}"
                               id="reserva_datainicio" required/>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="reserva_datafim" class="form-label">Data Final</label>
                        <input type="date" class="form-control" th:field="*{reservadataFim}"
                               id="reserva_datafim" required/>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="hora_chegada" class="form-label">Hora de Chegada</label>
                        <input type="time" class="form-control" th:field="*{horariochegada}"
                               id="hora_chegada" required/>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="hora_saida" class="form-label">Hora de Saída</label>
                        <input type="time" class="form-control" th:field="*{horarioSaida}"
                               id="hora_saida" required/>
                    </div>
                </div>
                <div class="row mt-4">
                    <div class="col-auto">
                        <button type="submit" class="btn btn-primary">Cadastrar Reserva</button>
                    </div>
                    <div class="col-auto">
                        <a th:href="@{~/reservalista}" class="btn btn-secondary">Cancelar</a>
                    </div>
                </div>

                <br>
                <div th:if="${param.erro}" class="alert alert-danger text-center" role="alert">
                    <span th:text="${erroDto != null ? erroDto.mensagem : 'Erro ao processar cadastro.'}">Erro</span>
                </div>
            </form>

        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

<footer class="text-center py-3">
    <div class="container">
        <span class="text-muted">© Turma 2023/2 - 2025/1 | SENAI Desenvolvimento de Sistemas</span>
    </div>
</footer>

</body>
</html>
